[www]
user = www-data
group = www-data
listen = 9000

; Process manager: dynamic scales workers up/down based on demand.
pm = dynamic

; Maximum number of concurrent PHP-FPM worker processes.
; Sized for ~50 concurrent requests; adjust after load testing:
;   pm.max_children = available_php_ram / avg_worker_ram_usage
pm.max_children = 50

; Initial workers spawned on startup
pm.start_servers = 5

; Minimum idle workers kept alive
pm.min_spare_servers = 5

; Maximum idle workers allowed before extras are killed
pm.max_spare_servers = 35

; Recycle each worker after this many requests to prevent memory creep.
; 500 is a conservative safe value; increase if workers restart too often.
pm.max_requests = 500
